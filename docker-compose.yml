services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Useful for Vite dev server hot-reload in Docker
      - VITE_BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "514:514/udp" # Syslog UDP
    volumes:
      - ./backend:/app/backend
      - ./data/datasets:/app/data/datasets:ro
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - SYSLOG_HOST=0.0.0.0
      - SYSLOG_PORT=514
    depends_on:
      - tools # Assuming backend queries the tools REST API, wait for tools

  tools:
    build:
      context: . # Build from root to grab backend/requirements.txt
      dockerfile: tools/Dockerfile
    ports:
      - "5050:5050"
    volumes:
      - ./tools:/app/tools
      - ./data/datasets:/app/data/datasets:ro
    command: ["python", "-m", "tools.Log_Stream_Generator", "--parquet", "data/datasets/CIC-IDS-Collection.parquet", "--syslog", "--syslog-host", "backend", "--max-flows", "100", "--format", "fortigate", "--speed", "2"]
