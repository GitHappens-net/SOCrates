services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5174"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_BACKEND_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "514:514/udp"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data:ro
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - SYSLOG_HOST=0.0.0.0
      - SYSLOG_PORT=514 
      - DATABASE_PATH=/tmp/socrates.db

  tools:
    build:
      context: .
      dockerfile: tools/Dockerfile
    depends_on:
      - backend
    profiles:
      - simulator
    ports:
      - "5050:5050"
    volumes:
      - ./tools:/app/tools
      - ./data:/app/data:ro
    command: ["python", "-m", "tools.Log_Stream_Generator", "--parquet", "data/cic-collection.parquet", "--syslog-host", "backend", "--max-flows", "1597", "--speed", "5", "--demo"]
